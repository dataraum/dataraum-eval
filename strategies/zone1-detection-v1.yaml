name: zone1-detection-v1
level: high
description: "Zone 1 calibration — raised rates and detector_id overrides for Gate 1 recall"

# Changes vs baseline (medium.yaml):
# - introduce_nulls ratio 0.15 → 0.40 (null_ratio score was 0.15, below 0.3 threshold)
# - corrupt_types ratio 0.03 → 0.15 (3% doesn't affect type inference)
# - break_referential_integrity ratio 0.05 → 0.20 (composite dilutes 5% to ~0.18)
# - obscure_column_names mapping → garbage names (abbreviations too mild for LLM)
# - corrupt_dates formats → unparseable, detector_id → type_fidelity (format→quarantine)

injections:
  # Value layer
  - injector: corrupt_types
    table: journal_lines
    detector_id: type_fidelity
    params:
      col: debit
      ratio: 0.15
      severity: high

  - injector: introduce_nulls
    table: journal_lines
    detector_id: null_ratio
    params:
      col: cost_center
      ratio: 0.40
      severity: high

  - injector: inject_outliers
    table: journal_lines
    detector_id: outlier_rate
    params:
      col: credit
      ratio: 0.05
      factor: 10.0
      severity: medium

  - injector: break_benford
    table: bank_transactions
    detector_id: benford
    params:
      col: amount
      method: round_numbers
      severity: medium

  - injector: inject_temporal_drift
    table: bank_transactions
    params:
      value_col: amount
      time_col: date
      shift_date: "2025-09-01"
      shift_factor: 1.35
      severity: medium

  # Semantic layer
  - injector: mix_units
    table: invoices
    detector_id: unit_entropy
    params:
      col: amount
      alt_currency: EUR
      ratio: 0.10
      fx_rate: 1.1
      severity: medium

  - injector: obscure_column_names
    table: invoices
    detector_id: business_meaning
    params:
      mapping:
        vendor_id: rrFlp_11_zp00
        payment_terms: xQ_v7kL
      severity: high

  # Structural layer
  - injector: corrupt_dates
    table: payments
    detector_id: temporal_entropy
    params:
      col: date
      formats:
        - "DD-Mon-YY"
        - "Mon DD, YYYY"
        - "epoch"
      severity: high

  - injector: break_referential_integrity
    table: payments
    detector_id: relationship_entropy
    params:
      fk_col: invoice_id
      ratio: 0.20
      severity: high

  - injector: create_mutual_exclusivity
    table: journal_lines
    params:
      col_a: debit
      col_b: credit
      severity: low

  # Cross-table consistency (no Zone 1 detector — kept for completeness)
  - injector: break_gl_invoice_match
    table: invoices
    params:
      col: amount
      ratio: 0.05
      severity: medium

  - injector: break_payment_bank_match
    table: payments
    params:
      col: amount
      ratio: 0.04
      severity: medium

  # Computational layer (no Zone 1 detector — kept for completeness)
  - injector: drift_formula
    table: trial_balance
    params:
      derived_col: debit_balance
      source_cols:
        - account_id
        - period
      error_ratio: 0.02
      severity: medium

  - injector: break_trial_balance
    table: trial_balance
    params:
      col: credit_balance
      ratio: 0.03
      severity: medium

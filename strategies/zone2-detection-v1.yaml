name: zone2-detection-v1
level: medium
description: "Zone 2 calibration — clean types, drift and dimensional injections for Gate 2 recall"

# Zone 2 tests detectors that need enrichment analyses (enriched_views,
# correlations, slicing, temporal_slice_analysis). Type-breaking injections
# from Zone 1 are omitted so DATE columns remain properly typed and
# temporal/dimensional analysis can work.

injections:
  # Temporal drift — bank_transactions.amount shifts after mid-year
  # Requires: temporal_slice_analysis → DRIFT_SUMMARIES
  - injector: inject_temporal_drift
    table: bank_transactions
    detector_id: temporal_drift
    params:
      value_col: amount
      time_col: date
      shift_date: "2025-07-01"
      shift_factor: 1.35
      severity: medium

  # NOTE: dimensional_entropy is NOT injection-testable. It measures
  # undocumented cross-column patterns (e.g. debit/credit mutual exclusivity).
  # Clean data already scores 0.7 because the pattern is natural in
  # double-entry bookkeeping. The real test is fix calibration:
  # document_business_rule → score drops.

  # Benford — round numbers in bank transactions (Zone 1 detector, but
  # included to verify Zone 1 detectors still fire at Gate 2)
  - injector: break_benford
    table: bank_transactions
    detector_id: benford
    params:
      col: amount
      method: round_numbers
      severity: medium

  # Null ratio — Zone 1 detector baseline check at Gate 2
  - injector: introduce_nulls
    table: journal_lines
    detector_id: null_ratio
    params:
      col: cost_center
      ratio: 0.40
      severity: high

  # Derived value — formula drift in net_amount = debit - credit
  # Requires: correlations → DerivedColumn detection
  - injector: drift_formula
    table: journal_lines
    detector_id: derived_value
    params:
      derived_col: net_amount
      source_cols: [debit, credit]
      error_ratio: 0.10
      severity: medium

  # Relationship entropy — orphaned payments
  - injector: break_referential_integrity
    table: payments
    detector_id: relationship_entropy
    params:
      fk_col: invoice_id
      ratio: 0.20
      severity: high

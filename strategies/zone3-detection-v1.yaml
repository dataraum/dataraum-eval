name: zone3-detection-v1
level: medium
description: "Zone 3 calibration — cross-table consistency injections for Gate 3 recall"

# Zone 3 tests detectors that need validation and business_cycles analyses.
# Carries forward Zone 2 injections (clean types, drift, dimensional) and adds
# cross-table injections that the validation phase catches via SQL checks.
#
# Type-breaking injections from Zone 1 are still omitted so DATE columns
# remain properly typed for temporal/dimensional/cycle analysis.

injections:
  # =========================================================================
  # Zone 2 baselines (carried forward — verify no regression)
  # =========================================================================

  # Temporal drift — bank_transactions.amount shifts after mid-year
  - injector: inject_temporal_drift
    table: bank_transactions
    detector_id: temporal_drift
    params:
      value_col: amount
      time_col: date
      shift_date: "2025-07-01"
      shift_factor: 1.35
      severity: medium

  # Benford — round numbers in bank transactions
  - injector: break_benford
    table: bank_transactions
    detector_id: benford
    params:
      col: amount
      method: round_numbers
      severity: medium

  # Null ratio — missing cost centers
  - injector: introduce_nulls
    table: journal_lines
    detector_id: null_ratio
    params:
      col: cost_center
      ratio: 0.40
      severity: high

  # Derived value — formula drift in net_amount = debit - credit
  - injector: drift_formula
    table: journal_lines
    detector_id: derived_value
    params:
      derived_col: net_amount
      source_cols: [debit, credit]
      error_ratio: 0.10
      severity: medium

  # Relationship entropy — orphaned payments
  - injector: break_referential_integrity
    table: payments
    detector_id: relationship_entropy
    params:
      fk_col: invoice_id
      ratio: 0.20
      severity: high

  # =========================================================================
  # Zone 3 additions — cross-table consistency
  # Requires: validation phase → VALIDATION analysis
  # =========================================================================

  # GL-invoice mismatch — corrupt invoice amounts so they disagree with
  # journal line totals. Validation SQL catches the reconciliation failure.
  - injector: break_gl_invoice_match
    table: invoices
    detector_id: cross_table_consistency
    params:
      col: amount
      ratio: 0.05
      severity: medium

  # Payment-bank mismatch — corrupt payment amounts so they disagree with
  # bank transaction totals. Validation SQL catches the reconciliation failure.
  - injector: break_payment_bank_match
    table: payments
    detector_id: cross_table_consistency
    params:
      col: amount
      ratio: 0.04
      severity: medium

  # Trial balance break — corrupt credit_balance so debits ≠ credits.
  # Validation SQL catches the accounting equation failure.
  - injector: break_trial_balance
    table: trial_balance
    detector_id: cross_table_consistency
    params:
      col: credit_balance
      ratio: 0.03
      severity: medium
